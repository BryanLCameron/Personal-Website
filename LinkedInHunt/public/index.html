<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobTrack — LinkedIn Job Finder</title>
  <style>
    /* ── Reset & Base ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #090b11;
      --surface:     rgba(255,255,255,0.05);
      --surface-2:   rgba(255,255,255,0.08);
      --border:      rgba(255,255,255,0.10);
      --border-2:    rgba(255,255,255,0.16);
      --text:        #eef2f7;
      --text-muted:  #8291a9;
      --text-dim:    #526078;
      --accent:      #3f64ec;
      --accent-soft: rgba(63,100,236,0.12);
      --accent-glow: rgba(63,100,236,0.25);
      --green:       #22c55e;
      --green-soft:  rgba(34,197,94,0.12);
      --yellow:      #f59e0b;
      --yellow-soft: rgba(245,158,11,0.12);
      --red:         #ef4444;
      --red-soft:    rgba(239,68,68,0.12);
      --radius:      14px;
      --radius-sm:   8px;
      --shadow:      0 4px 24px rgba(0,0,0,0.4);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(9,11,17,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .logo-text span { color: var(--accent); }

    .header-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── Main ───────────────────────────────────────────────────────────── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Hero ───────────────────────────────────────────────────────────── */
    .hero {
      text-align: center;
      margin-bottom: 48px;
    }

    .hero-eyebrow {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(63,100,236,0.3);
      border-radius: 100px;
      padding: 4px 14px;
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -1px;
      color: var(--text);
      margin-bottom: 16px;
    }

    .hero-sub {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Search Card ────────────────────────────────────────────────────── */
    .search-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 40px;
      box-shadow: var(--shadow);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    @media (max-width: 640px) {
      .form-row { grid-template-columns: 1fr; }
    }

    .field-group { display: flex; flex-direction: column; gap: 6px; }

    .field-group label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .field-group input,
    .field-group select,
    .field-group textarea {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
      font-family: inherit;
    }

    .field-group input::placeholder,
    .field-group textarea::placeholder { color: var(--text-dim); }

    .field-group select option { background: #1a1f2e; }

    .field-group input:focus,
    .field-group select:focus,
    .field-group textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .field-group input.error,
    .field-group select.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px var(--red-soft);
    }

    .criteria-row { margin-bottom: 20px; }

    .criteria-row textarea {
      resize: vertical;
      min-height: 80px;
      line-height: 1.5;
    }

    .criteria-hint {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 6px;
    }

    .search-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, transform 0.1s, opacity 0.2s;
      letter-spacing: 0.2px;
    }

    .search-btn:hover  { background: #3056d3; }
    .search-btn:active { transform: scale(0.99); }
    .search-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results Header ─────────────────────────────────────────────────── */
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .results-meta {
      font-size: 14px;
      color: var(--text-muted);
    }

    .results-meta strong { color: var(--text); }

    .sort-badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(63,100,236,0.3);
      border-radius: 100px;
      padding: 3px 12px;
    }

    /* ── Job Card ───────────────────────────────────────────────────────── */
    .jobs-list { display: flex; flex-direction: column; gap: 16px; }

    .job-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      animation: fadeUp 0.3s ease both;
    }

    .job-card:hover {
      border-color: var(--border-2);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .job-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .job-title-row { flex: 1; min-width: 0; }

    .job-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .job-company {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .match-badge {
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 800;
      border-radius: 100px;
      padding: 4px 12px;
      white-space: nowrap;
    }

    .match-high   { background: var(--green-soft);  color: var(--green);  border: 1px solid rgba(34,197,94,0.3); }
    .match-medium { background: var(--yellow-soft); color: var(--yellow); border: 1px solid rgba(245,158,11,0.3); }
    .match-low    { background: var(--red-soft);    color: var(--red);    border: 1px solid rgba(239,68,68,0.3); }

    .job-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .meta-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 3px 10px;
    }

    .meta-pill svg { opacity: 0.6; flex-shrink: 0; }

    .remote-pill { color: var(--accent); background: var(--accent-soft); border-color: rgba(63,100,236,0.3); }

    .job-description {
      font-size: 13.5px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .keyword-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .keyword-pill {
      font-size: 11px;
      font-weight: 600;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid rgba(63,100,236,0.25);
      border-radius: 100px;
      padding: 2px 10px;
    }

    .job-card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .posted-date { font-size: 12px; color: var(--text-dim); }

    .apply-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      border-radius: var(--radius-sm);
      padding: 8px 18px;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .apply-btn:hover { background: #3056d3; }

    /* ── Feedback buttons ───────────────────────────────────────────────── */
    .feedback-btns {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .feedback-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px; height: 34px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface-2);
      cursor: pointer;
      font-size: 15px;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    .feedback-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--border-2); }
    .feedback-btn:active { transform: scale(0.92); }

    .feedback-btn.liked {
      background: var(--green-soft);
      border-color: rgba(34,197,94,0.4);
    }

    .feedback-btn.disliked {
      background: var(--red-soft);
      border-color: rgba(239,68,68,0.4);
    }

    /* ── Learned panel ──────────────────────────────────────────────────── */
    .learned-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    .learned-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
      padding-top: 3px;
    }

    .learned-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex: 1;
    }

    .learned-tag {
      font-size: 12px;
      font-weight: 600;
      border-radius: 100px;
      padding: 3px 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .learned-tag.pos { background: var(--green-soft);  color: var(--green);  border: 1px solid rgba(34,197,94,0.3); }
    .learned-tag.neg { background: var(--red-soft);    color: var(--red);    border: 1px solid rgba(239,68,68,0.3); }

    .learned-tag button {
      background: none; border: none; cursor: pointer;
      color: inherit; opacity: 0.6; font-size: 13px; padding: 0; line-height: 1;
    }
    .learned-tag button:hover { opacity: 1; }

    .learned-refining {
      font-size: 12px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      white-space: nowrap;
    }

    .pulse-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Save button ────────────────────────────────────────────────────── */
    .save-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px; height: 34px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface-2);
      cursor: pointer;
      font-size: 15px;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    .save-btn:hover  { background: rgba(255,255,255,0.1); border-color: var(--border-2); }
    .save-btn:active { transform: scale(0.92); }
    .save-btn.saved  {
      background: rgba(245,158,11,0.12);
      border-color: rgba(245,158,11,0.4);
    }

    /* ── Saved section ──────────────────────────────────────────────────── */
    .saved-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 24px;
      overflow: hidden;
    }

    .saved-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .saved-header.open { border-bottom-color: var(--border); }

    .saved-header-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .saved-count-badge {
      font-size: 11px;
      font-weight: 700;
      background: var(--yellow-soft);
      color: var(--yellow);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 100px;
      padding: 1px 8px;
    }

    .saved-toggle-icon {
      font-size: 11px;
      color: var(--text-dim);
      margin-left: auto;
      transition: transform 0.2s;
    }

    .saved-toggle-icon.open { transform: rotate(180deg); }

    .saved-list {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .saved-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      animation: fadeUp 0.2s ease both;
    }

    .saved-row-info { flex: 1; min-width: 0; }

    .saved-row-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .saved-row-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .saved-row-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .saved-apply-btn {
      font-size: 12px;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      text-decoration: none;
      white-space: nowrap;
    }

    .saved-remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 16px;
      line-height: 1;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }

    .saved-remove-btn:hover { color: var(--red); background: var(--red-soft); }

    .saved-hidden-note {
      font-size: 12px;
      color: var(--text-dim);
      padding: 4px 0 0;
      font-style: italic;
    }

    /* ── Skeleton ───────────────────────────────────────────────────────── */
    .skeleton-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
    }

    .skeleton-line {
      background: linear-gradient(90deg, var(--surface-2) 25%, rgba(255,255,255,0.09) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── States ─────────────────────────────────────────────────────────── */
    .state-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 56px 32px;
      text-align: center;
    }

    .state-icon {
      width: 64px; height: 64px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }

    .state-icon.error-icon { background: var(--red-soft); }
    .state-icon.empty-icon { background: var(--accent-soft); }

    .state-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .state-body {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 400px;
      margin: 0 auto 24px;
      line-height: 1.6;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      border-radius: var(--radius-sm);
      padding: 10px 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .retry-btn:hover { background: rgba(255,255,255,0.1); }

    /* ── Footer ─────────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-dim);
    }

    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header>
    <div class="header-inner">
      <a href="/" class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 6l7 4 7-4M10 10v10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="logo-text">Job<span>Track</span></span>
      </a>
      <div class="header-badge">Powered by LinkedIn</div>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <main>

    <!-- Hero -->
    <div class="hero">
      <div class="hero-eyebrow">Real-time LinkedIn Jobs</div>
      <h1>Find Your Next<br>Opportunity</h1>
      <p class="hero-sub">Search live LinkedIn job postings by title and location, all in one place.</p>
    </div>

    <!-- Search Form -->
    <div class="search-card">
      <form id="searchForm" novalidate>
        <div class="form-row">
          <div class="field-group">
            <label for="jobTitle">Job Title</label>
            <input
              type="text"
              id="jobTitle"
              name="jobTitle"
              placeholder="e.g. Software Engineer"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
          <div class="field-group">
            <label for="city">City</label>
            <input
              type="text"
              id="city"
              name="city"
              placeholder="e.g. San Jose"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
          <div class="field-group">
            <label for="state">State</label>
            <select id="state" name="state">
              <option value="">Select state…</option>
              <option>Alabama</option><option>Alaska</option><option>Arizona</option>
              <option>Arkansas</option><option>California</option><option>Colorado</option>
              <option>Connecticut</option><option>Delaware</option><option>Florida</option>
              <option>Georgia</option><option>Hawaii</option><option>Idaho</option>
              <option>Illinois</option><option>Indiana</option><option>Iowa</option>
              <option>Kansas</option><option>Kentucky</option><option>Louisiana</option>
              <option>Maine</option><option>Maryland</option><option>Massachusetts</option>
              <option>Michigan</option><option>Minnesota</option><option>Mississippi</option>
              <option>Missouri</option><option>Montana</option><option>Nebraska</option>
              <option>Nevada</option><option>New Hampshire</option><option>New Jersey</option>
              <option>New Mexico</option><option>New York</option><option>North Carolina</option>
              <option>North Dakota</option><option>Ohio</option><option>Oklahoma</option>
              <option>Oregon</option><option>Pennsylvania</option><option>Rhode Island</option>
              <option>South Carolina</option><option>South Dakota</option><option>Tennessee</option>
              <option>Texas</option><option>Utah</option><option>Vermont</option>
              <option>Virginia</option><option>Washington</option><option>West Virginia</option>
              <option>Wisconsin</option><option>Wyoming</option>
            </select>
          </div>
        </div>

        <div class="field-group criteria-row">
          <label for="criteria">Job Criteria <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
          <textarea
            id="criteria"
            name="criteria"
            placeholder="Describe your ideal role — e.g. remote Python developer with ML experience, Series B startup, equity comp…"
          ></textarea>
          <p class="criteria-hint">Jobs will be scored and sorted by how well they match your criteria.</p>
        </div>

        <button type="submit" class="search-btn" id="searchBtn">
          <span class="spinner" id="spinner"></span>
          <span id="btnText">Search Jobs</span>
        </button>
      </form>
    </div>

    <!-- Saved Jobs Section -->
    <div id="savedSection" style="display:none"></div>

    <!-- Learned Preferences Panel -->
    <div id="learnedPanel" style="display:none"></div>

    <!-- Results Area -->
    <div id="resultsArea"></div>

  </main>

  <!-- ── Footer ─────────────────────────────────────────────────────────── -->
  <footer>
    <p>
      JobTrack by <a href="https://bryancameron.io" target="_blank">Bryan Cameron</a> ·
      Job data via <a href="https://www.linkedin.com/jobs" target="_blank">LinkedIn Jobs</a>
    </p>
  </footer>

  <!-- ── Scripts ────────────────────────────────────────────────────────── -->
  <script>
  (function () {
    'use strict';

    // ── Config ────────────────────────────────────────────────────────────
    const API_BASE = 'https://personal-website-h6u2.onrender.com';

    // ── DOM refs ──────────────────────────────────────────────────────────
    const form          = document.getElementById('searchForm');
    const titleInput    = document.getElementById('jobTitle');
    const cityInput     = document.getElementById('city');
    const stateInput    = document.getElementById('state');
    const criteriaInput = document.getElementById('criteria');
    const searchBtn     = document.getElementById('searchBtn');
    const spinner       = document.getElementById('spinner');
    const btnText       = document.getElementById('btnText');
    const resultsArea   = document.getElementById('resultsArea');
    const learnedPanel  = document.getElementById('learnedPanel');
    const savedSection  = document.getElementById('savedSection');

    // ── State ─────────────────────────────────────────────────────────────
    let currentQuery  = null;
    let jobsCache     = [];           // last batch of jobs from API
    let feedbackMap   = {};           // jobIndex → 'up' | 'down'
    let baseCriteria  = '';           // user's original typed criteria
    let learned = { positive: new Set(), negative: new Set() };
    let savedJobs     = loadSavedJobs();   // persisted to localStorage
    let noGoodJobs    = loadNoGoodJobs();  // persisted to localStorage
    let savedOpen     = true;

    // ── localStorage helpers ──────────────────────────────────────────────
    function loadSavedJobs () {
      try { return JSON.parse(localStorage.getItem('jobtrack_saved') || '[]'); }
      catch (_) { return []; }
    }

    function persistSavedJobs () {
      try { localStorage.setItem('jobtrack_saved', JSON.stringify(savedJobs)); }
      catch (_) {}
    }

    function loadNoGoodJobs () {
      try { return JSON.parse(localStorage.getItem('jobtrack_nogood') || '[]'); }
      catch (_) { return []; }
    }

    function persistNoGoodJobs () {
      try { localStorage.setItem('jobtrack_nogood', JSON.stringify(noGoodJobs)); }
      catch (_) {}
    }

    function savedJobKey (job) {
      return job.applyLink || `${job.title}__${job.company}`;
    }

    function isJobSaved (job) {
      const key = savedJobKey(job);
      return savedJobs.some(j => savedJobKey(j) === key);
    }

    function isJobNoGood (job) {
      const key = savedJobKey(job);
      return noGoodJobs.some(j => savedJobKey(j) === key);
    }

    // Render saved section on load if there are any
    renderSavedSection();

    // ── Form Submit ───────────────────────────────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!validate()) return;

      // Reset learned state on a fresh manual search
      learned = { positive: new Set(), negative: new Set() };
      feedbackMap = {};
      baseCriteria = criteriaInput.value.trim();
      renderLearnedPanel();

      const title = titleInput.value.trim();
      const city  = cityInput.value.trim();
      const state = stateInput.value;

      currentQuery = { title, city, state };
      await fetchJobs(title, city, state);
    });

    // ── Validation ────────────────────────────────────────────────────────
    function validate () {
      let ok = true;
      [titleInput, cityInput, stateInput].forEach(el => el.classList.remove('error'));
      if (!titleInput.value.trim()) { titleInput.classList.add('error'); ok = false; }
      if (!cityInput.value.trim())  { cityInput.classList.add('error');  ok = false; }
      if (!stateInput.value)        { stateInput.classList.add('error'); ok = false; }
      return ok;
    }

    [titleInput, cityInput, stateInput].forEach(el => {
      el.addEventListener('input',  () => el.classList.remove('error'));
      el.addEventListener('change', () => el.classList.remove('error'));
    });

    // ── Fetch Jobs ────────────────────────────────────────────────────────
    async function fetchJobs (title, city, state) {
      setLoading(true);
      showSkeletons();

      // Combine user criteria with learned positive keywords
      const combinedCriteria = buildCriteria();
      const avoidStr         = [...learned.negative].join(' ');

      // Request extra results to cover jobs that will be filtered (saved / no-good)
      const filterBuffer  = savedJobs.length + noGoodJobs.length;
      const resultsWanted = Math.min(50, 20 + filterBuffer);

      const params = new URLSearchParams({ title, city, state, results: resultsWanted });
      if (combinedCriteria) params.set('criteria', combinedCriteria);
      if (avoidStr)         params.set('avoid', avoidStr);

      try {
        const res  = await fetch(`${API_BASE}/api/jobs?${params}`);
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Something went wrong. Please try again.');

        jobsCache = data.jobs || [];
        renderResults(data);
      } catch (err) {
        renderError(err.message);
      } finally {
        setLoading(false);
      }
    }

    function buildCriteria () {
      const parts = [];
      if (baseCriteria) parts.push(baseCriteria);
      if (learned.positive.size) parts.push([...learned.positive].join(' '));
      return parts.join(' ').trim();
    }

    // ── Feedback ──────────────────────────────────────────────────────────
    window._jobFeedback = function (index, direction) {
      const job = jobsCache[index];
      if (!job) return;

      // Toggle: clicking same button again removes it
      if (feedbackMap[index] === direction) {
        delete feedbackMap[index];
        removeJobKeywords(job);
        if (direction === 'down') {
          noGoodJobs = noGoodJobs.filter(j => savedJobKey(j) !== savedJobKey(job));
          persistNoGoodJobs();
        }
      } else {
        const prev = feedbackMap[index];
        // If switching away from dislike, remove from no-good list
        if (prev === 'down') {
          noGoodJobs = noGoodJobs.filter(j => savedJobKey(j) !== savedJobKey(job));
          persistNoGoodJobs();
        }
        feedbackMap[index] = direction;
        if (prev) removeJobKeywords(job);
        addJobKeywords(job, direction);
        // Thumbs down → add to persistent no-good list
        if (direction === 'down' && !isJobNoGood(job)) {
          noGoodJobs.push(job);
          persistNoGoodJobs();
        }
      }

      renderLearnedPanel();
      updateFeedbackButtons();
    };

    window._clearNoGood = function () {
      noGoodJobs = [];
      persistNoGoodJobs();
    };

    function extractJobKeywords (job) {
      const stopWords = new Set([
        'a','an','the','and','or','but','in','on','at','to','for','of','with',
        'is','are','was','we','our','you','your','it','its','this','that',
        'be','been','have','has','will','would','could','should','may','might',
      ]);
      const raw = `${job.title || ''} ${job.company || ''}`.toLowerCase();
      const words = (raw.match(/\b[a-z][a-z0-9+#.\-]{1,}\b/g) || []);
      return [...new Set(words.filter(w => !stopWords.has(w) && w.length > 2))].slice(0, 5);
    }

    function addJobKeywords (job, direction) {
      const keywords = extractJobKeywords(job);
      const target   = direction === 'up' ? learned.positive : learned.negative;
      const opposite = direction === 'up' ? learned.negative : learned.positive;
      keywords.forEach(k => { target.add(k); opposite.delete(k); });
    }

    function removeJobKeywords (job) {
      const keywords = extractJobKeywords(job);
      keywords.forEach(k => { learned.positive.delete(k); learned.negative.delete(k); });
    }

    // ── Learned Panel ─────────────────────────────────────────────────────
    function renderLearnedPanel () {
      const hasPos = learned.positive.size > 0;
      const hasNeg = learned.negative.size > 0;

      if (!hasPos && !hasNeg) {
        learnedPanel.style.display = 'none';
        learnedPanel.innerHTML = '';
        return;
      }

      const posTags = [...learned.positive].map(k => `
        <span class="learned-tag pos">
          👍 ${escHtml(k)}
          <button onclick="window._removeLearned('pos','${escHtml(k)}')" title="Remove">×</button>
        </span>`).join('');

      const negTags = [...learned.negative].map(k => `
        <span class="learned-tag neg">
          👎 ${escHtml(k)}
          <button onclick="window._removeLearned('neg','${escHtml(k)}')" title="Remove">×</button>
        </span>`).join('');

      learnedPanel.style.display = 'flex';
      learnedPanel.className = 'learned-panel';
      learnedPanel.innerHTML = `
        <span class="learned-label">Learned</span>
        <div class="learned-tags">${posTags}${negTags}</div>
        <div style="display:flex;gap:8px;flex-shrink:0">
          <button class="retry-btn" style="padding:5px 14px;font-size:12px" onclick="window._clearLearned()">Clear</button>
          <button class="apply-btn" style="padding:7px 18px;font-size:13px" onclick="window._refineSearch()">
            🔍 Refine Search
          </button>
        </div>`;
    }

    window._removeLearned = function (type, keyword) {
      if (type === 'pos') learned.positive.delete(keyword);
      else                learned.negative.delete(keyword);
      renderLearnedPanel();
    };

    window._clearLearned = function () {
      learned = { positive: new Set(), negative: new Set() };
      feedbackMap = {};
      renderLearnedPanel();
      updateFeedbackButtons();
    };

    window._refineSearch = function () {
      if (!currentQuery) return;
      fetchJobs(currentQuery.title, currentQuery.city, currentQuery.state);
    };

    // ── Save / Unsave ─────────────────────────────────────────────────────
    window._toggleSave = function (index) {
      const job = jobsCache[index];
      if (!job) return;
      const key = savedJobKey(job);
      if (isJobSaved(job)) {
        savedJobs = savedJobs.filter(j => savedJobKey(j) !== key);
      } else {
        savedJobs.push(job);
      }
      persistSavedJobs();
      renderSavedSection();
      // Update save button on the card without re-fetching
      const card = document.querySelector(`[data-fb-index="${index}"]`);
      if (card) {
        const btn = card.querySelector('.save-btn');
        if (btn) btn.className = `save-btn${isJobSaved(job) ? ' saved' : ''}`;
      }
    };

    window._removeSaved = function (key) {
      savedJobs = savedJobs.filter(j => savedJobKey(j) !== key);
      persistSavedJobs();
      renderSavedSection();
    };

    window._clearSavedAll = function () {
      savedJobs = [];
      persistSavedJobs();
      renderSavedSection();
    };

    window._toggleSavedOpen = function () {
      savedOpen = !savedOpen;
      const list   = document.getElementById('savedList');
      const header = document.querySelector('.saved-header');
      const icon   = document.querySelector('.saved-toggle-icon');
      if (list)   list.style.display   = savedOpen ? 'flex' : 'none';
      if (header) header.className     = `saved-header${savedOpen ? ' open' : ''}`;
      if (icon)   icon.className       = `saved-toggle-icon${savedOpen ? ' open' : ''}`;
    };

    function renderSavedSection () {
      if (!savedJobs.length) {
        savedSection.style.display = 'none';
        savedSection.innerHTML = '';
        return;
      }

      const rows = savedJobs.map(job => {
        const key  = savedJobKey(job);
        const sub  = [job.company, job.location].filter(Boolean).join(' · ');
        return `
          <div class="saved-row">
            <div class="saved-row-info">
              <div class="saved-row-title">${escHtml(job.title)}</div>
              <div class="saved-row-sub">${escHtml(sub)}</div>
            </div>
            <div class="saved-row-actions">
              <a class="saved-apply-btn" href="${escHtml(job.applyLink)}" target="_blank" rel="noopener noreferrer">Apply</a>
              <button class="saved-remove-btn" onclick="window._removeSaved('${escHtml(key)}')" title="Remove">×</button>
            </div>
          </div>`;
      }).join('');

      savedSection.style.display = 'block';
      savedSection.innerHTML = `
        <div class="saved-section">
          <div class="saved-header${savedOpen ? ' open' : ''}" onclick="window._toggleSavedOpen()">
            <span class="saved-header-title">
              ⭐ Saved Jobs
              <span class="saved-count-badge">${savedJobs.length}</span>
            </span>
            <span style="font-size:12px;color:var(--text-dim);margin-left:auto">
              ${savedJobs.length} saved · hidden from new results
            </span>
            <span class="saved-toggle-icon${savedOpen ? ' open' : ''}">▼</span>
          </div>
          <div id="savedList" class="saved-list" style="display:${savedOpen ? 'flex' : 'none'}">
            ${rows}
            <div style="display:flex;justify-content:flex-end;padding-top:4px">
              <button class="retry-btn" style="padding:5px 14px;font-size:12px" onclick="window._clearSavedAll()">Clear All Saved</button>
            </div>
          </div>
        </div>`;
    }

    // Re-render just the thumbs button states without re-fetching
    function updateFeedbackButtons () {
      document.querySelectorAll('[data-fb-index]').forEach(card => {
        const index = parseInt(card.dataset.fbIndex);
        const state = feedbackMap[index];
        const upBtn   = card.querySelector('.fb-up');
        const downBtn = card.querySelector('.fb-down');
        if (upBtn)   upBtn.className   = `feedback-btn fb-up   ${state === 'up'   ? 'liked'    : ''}`;
        if (downBtn) downBtn.className = `feedback-btn fb-down ${state === 'down' ? 'disliked' : ''}`;
      });
    }

    // ── Loading state ─────────────────────────────────────────────────────
    function setLoading (on) {
      searchBtn.disabled    = on;
      spinner.style.display = on ? 'block' : 'none';
      btnText.textContent   = on ? 'Searching…' : 'Search Jobs';
    }

    function showSkeletons () {
      resultsArea.innerHTML = Array.from({ length: 4 }, () => `
        <div class="skeleton-card" style="margin-bottom:16px">
          <div class="skeleton-line" style="height:20px;width:60%;margin-bottom:8px"></div>
          <div class="skeleton-line" style="height:14px;width:35%;margin-bottom:16px"></div>
          <div class="skeleton-line" style="height:13px;width:90%;margin-bottom:6px"></div>
          <div class="skeleton-line" style="height:13px;width:75%"></div>
        </div>
      `).join('');
    }

    // ── Render Results ────────────────────────────────────────────────────
    function renderResults (data) {
      const { jobs = [], total, criteria } = data;

      if (!jobs.length) {
        resultsArea.innerHTML = `
          <div class="state-card">
            <div class="state-icon empty-icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
              </svg>
            </div>
            <p class="state-title">No jobs found</p>
            <p class="state-body">
              We couldn't find any postings for <strong>"${escHtml(currentQuery.title)}"</strong>
              in <strong>${escHtml(currentQuery.city)}, ${escHtml(currentQuery.state)}</strong>.
              Try broadening your search or checking back soon.
            </p>
            <button class="retry-btn" onclick="document.getElementById('jobTitle').focus()">Modify Search</button>
          </div>`;
        return;
      }

      const hasCriteria = criteria && criteria.trim().length > 0;
      const hasLearned  = learned.positive.size > 0 || learned.negative.size > 0;
      const headerHtml = `
        <div class="results-header">
          <p class="results-meta">
            Found <strong>${total} job${total !== 1 ? 's' : ''}</strong> for
            <strong>${escHtml(currentQuery.title)}</strong> in
            <strong>${escHtml(currentQuery.city)}, ${escHtml(currentQuery.state)}</strong>
          </p>
          ${(hasCriteria || hasLearned) ? '<span class="sort-badge">Sorted by Match</span>' : ''}
        </div>`;

      // Filter out saved and no-good jobs; keep original indices so handlers stay in sync
      // Slice to 20 so the user always sees a full page of fresh results
      const indexedJobs   = jobs.map((job, i) => ({ job, i }))
        .filter(({ job }) => !isJobSaved(job) && !isJobNoGood(job))
        .slice(0, 20);
      const hiddenSaved   = jobs.filter(j => isJobSaved(j)).length;
      const hiddenNoGood  = jobs.filter(j => isJobNoGood(j)).length;

      const noteParts = [];
      if (hiddenSaved  > 0) noteParts.push(`${hiddenSaved} saved`);
      if (hiddenNoGood > 0) noteParts.push(`${hiddenNoGood} not interested`);
      const hiddenNote = noteParts.length
        ? `<p style="margin-bottom:12px;font-size:12px;color:var(--text-dim);font-style:italic;">
            ${noteParts.join(' · ')} hidden
            ${hiddenNoGood > 0
              ? `· <button onclick="window._clearNoGood()" style="background:none;border:none;cursor:pointer;color:var(--accent);font-size:12px;padding:0;font-style:normal;">Clear not-interested list</button>`
              : ''}
           </p>`
        : '';

      const cardsHtml = indexedJobs.map(({ job, i }) => renderCard(job, i, hasCriteria || hasLearned)).join('');
      resultsArea.innerHTML = headerHtml + hiddenNote + '<div class="jobs-list">' + cardsHtml + '</div>';
    }

    function renderCard (job, index, hasCriteria) {
      const delay     = Math.min(index * 50, 300);
      const fbState   = feedbackMap[index];

      // Match badge
      let badgeHtml = '';
      if (hasCriteria && job.matchScore !== null && job.matchScore !== undefined) {
        const score = job.matchScore;
        const cls   = score >= 65 ? 'match-high' : score >= 35 ? 'match-medium' : 'match-low';
        badgeHtml = `<span class="match-badge ${cls}">${score}% Match</span>`;
      }

      // Meta pills
      const metaPills = [];
      if (job.location) {
        metaPills.push(`
          <span class="meta-pill">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${escHtml(job.location)}
          </span>`);
      }
      if (job.isRemote) metaPills.push(`<span class="meta-pill remote-pill">Remote</span>`);
      if (job.employmentType) {
        const labels = { FULLTIME:'Full-time', PARTTIME:'Part-time', CONTRACTOR:'Contract', INTERN:'Internship', TEMPORARY:'Temporary' };
        metaPills.push(`<span class="meta-pill">${labels[job.employmentType] || job.employmentType}</span>`);
      }
      if (job.salary) {
        metaPills.push(`
          <span class="meta-pill">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
            ${escHtml(job.salary)}
          </span>`);
      }

      // Keyword pills
      const kwHtml = (job.matchKeywords && job.matchKeywords.length)
        ? `<div class="keyword-pills">${job.matchKeywords.map(k => `<span class="keyword-pill">${escHtml(k)}</span>`).join('')}</div>`
        : '';

      // Description
      const descHtml = job.description
        ? `<p class="job-description">${escHtml(job.description)}</p>`
        : '';

      // Posted date
      let postedHtml = '';
      if (job.postedAt) {
        try {
          const d = new Date(job.postedAt);
          const diffDays = Math.floor((Date.now() - d.getTime()) / 86400000);
          const label = diffDays === 0 ? 'Today'
                      : diffDays === 1 ? 'Yesterday'
                      : diffDays < 30  ? `${diffDays}d ago`
                      : d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
          postedHtml = `<span class="posted-date">Posted ${label}</span>`;
        } catch (_) {}
      }

      return `
        <div class="job-card" style="animation-delay:${delay}ms" data-fb-index="${index}">
          <div class="job-card-top">
            <div class="job-title-row">
              <p class="job-title">${escHtml(job.title)}</p>
              <p class="job-company">${escHtml(job.company || '')}</p>
            </div>
            ${badgeHtml}
          </div>
          <div class="job-meta">${metaPills.join('')}</div>
          ${descHtml}
          ${kwHtml}
          <div class="job-card-bottom">
            ${postedHtml}
            <div style="display:flex;align-items:center;gap:10px">
              <div class="feedback-btns">
                <button class="feedback-btn fb-up ${fbState === 'up' ? 'liked' : ''}"
                  onclick="window._jobFeedback(${index},'up')"
                  title="More like this">👍</button>
                <button class="feedback-btn fb-down ${fbState === 'down' ? 'disliked' : ''}"
                  onclick="window._jobFeedback(${index},'down')"
                  title="Less like this">👎</button>
                <button class="save-btn${isJobSaved(job) ? ' saved' : ''}"
                  onclick="window._toggleSave(${index})"
                  title="${isJobSaved(job) ? 'Unsave job' : 'Save job'}">⭐</button>
              </div>
              <a class="apply-btn" href="${escHtml(job.applyLink)}" target="_blank" rel="noopener noreferrer">
                Apply on LinkedIn
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              </a>
            </div>
          </div>
        </div>`;
    }

    // ── Error state ───────────────────────────────────────────────────────
    function renderError (msg) {
      resultsArea.innerHTML = `
        <div class="state-card">
          <div class="state-icon error-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </div>
          <p class="state-title">Something went wrong</p>
          <p class="state-body">${escHtml(msg)}</p>
          <button class="retry-btn" onclick="document.getElementById('searchForm').dispatchEvent(new Event('submit'))">
            Try Again
          </button>
        </div>`;
    }

    // ── Helpers ───────────────────────────────────────────────────────────
    function escHtml (str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

  }());
  </script>

</body>
</html>
