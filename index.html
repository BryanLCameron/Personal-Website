<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bryan Cameron</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .name {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #444;
      margin: 1.5rem auto;
    }

    .tagline {
      font-size: 1rem;
      color: #666;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: #333;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 class="name">Bryan Cameron</h1>
    <div class="divider"></div>
    <p class="tagline">Coming Soon</p>
  </div>

  <footer>bryancameron.io</footer>

</body>
</html>
